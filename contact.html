<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Zheying Liu</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css">
</head>
<body>

<div class="bg-grid"></div>
<canvas id="codeRain"></canvas>

<audio id="bgm" loop>
  <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/FreezeTank/Atmospheric_Drama/FreezeTank_-_01_-_Digital_Shadows.mp3" type="audio/mpeg">


<div class="music-btn" id="musicToggle">
  <i class="fa-solid fa-music"></i>
</div>

<div class="info-bar">
  <div id="real-time"><i class="fa-solid fa-clock"></i> Loading...</div>
  <div class="weather">
    <span id="weather-sh">22°C</span>
    <span id="weather-hk">25°C</span>
  </div>
</div>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('zh')">中</button>
  <button onclick="setLang('tw')">繁</button>
</div>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  < <a href="experience.html">Experience</a>
  <a href="projects.html">Projects</a>
  <a href="blog.html">Blog</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">
  <h2 class="section-title">Contact</h2>
  <div class="card">
    <div class="form-group">
      <input type="text" placeholder="Your Name">
    </div>
    <div class="form-group">
      <input type="email" placeholder="Your Email">
    </div>
    <div class="form-group">
      <textarea placeholder="Your Message"></textarea>
    </div>
    <button class="btn-submit" onclick="alert('Message received!')">Send Message</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
