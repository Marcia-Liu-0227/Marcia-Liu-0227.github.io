<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Miss Liu</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
  body {background:#105f41;color:#e6f7ef;padding:2rem;line-height:1.6;}
  .time-bar {position:fixed;top:10px;left:20px;color:#1effaa;font-size:0.9rem;}
  .navbar {display:flex;gap:1.2rem;justify-content:center;margin:2rem 0;flex-wrap:wrap;}
  .navbar a {color:#1effaa;text-decoration:none;font-weight:500;}
  .container {max-width:720px;margin:0 auto;}
  .section-title {text-align:center;font-size:1.8rem;margin-bottom:2rem;}
  .card {background:rgba(12,60,44,0.6);padding:1.6rem;border-radius:10px;margin-bottom:1.2rem;}
  .contact-info p {font-size:1.05rem;margin:0.6rem 0;text-align:center;}
  .form-group {margin-bottom:1rem;}
  .form-group input,.form-group textarea {width:100%;padding:0.8rem;background:rgba(255,255,255,0.07);border:1px solid #1effaa;border-radius:6px;color:#fff;font-size:1rem;}
  .form-group textarea {min-height:130px;}
  button {background:#1effaa;color:#0c4a31;border:none;padding:0.9rem;width:100%;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer;}
  .footer {text-align:center;margin-top:3rem;color:#1effaa;font-style:italic;}
  .lang-switch {display:flex;justify-content:center;gap:0.6rem;margin-bottom:1rem;}
  .lang-switch button {background:rgba(255,255,255,0.1);color:#e6f7ef;border:1px solid #1effaa;border-radius:6px;padding:0.3rem 0.7rem;font-size:0.9rem;cursor:pointer;}
</style>
</head>
<body>

<div class="time-bar" id="clock">Loading...</div>

<div class="lang-switch">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('tw')">繁體</button>
</div>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="experience.html">Experience</a>
  <a href="projects.html">Projects</a>
  <a href="blog.html">Blog</a>
  <a href="contact.html">Contact</a>
</div>

<div class="container">
  <h2 class="section-title">Contact Miss Liu</h2>
  <div class="card contact-info">
    <p><strong>Miss Zheying (Marcia) Liu</strong></p>
    <p>Email: marcialiu0227@gmail.com</p>
    <p>HK Phone: 64746795 | CN Phone: 18817720227</p>
    <p>Base: Hong Kong / Shanghai</p>
  </div>
  <div class="card">
    <form action="mailto:marcialiu0227@gmail.com" method="post" enctype="text/plain">
      <div class="form-group"><input type="text" name="name" placeholder="Your Name" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="Your Email" required></div>
      <div class="form-group"><textarea name="message" placeholder="Your Message" required></textarea></div>
      <button type="submit">Send Message to Miss Liu</button>
    </form>
  </div>
</div>

<div class="footer">L’honneur s’incline devant moi.</div>

<script>
setInterval(()=>{const d=new Date();const h=String(d.getHours()).padStart(2,'0');const m=String(d.getMinutes()).padStart(2,'0');const s=String(d.getSeconds()).padStart(2,'0');document.getElementById('clock').innerText=`${h}:${m}:${s}`},1000);
function setLang(l){localStorage.setItem('lang',l);window.location.reload();}
</script>
</body>
</html>
